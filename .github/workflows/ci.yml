name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build must succeed without live secrets; the page degrades to an
          # empty taxonomy when Supabase env is absent (see app/signal-room/page.tsx).
          NEXT_PUBLIC_SIGNAL_ROOM_LIVE: "false"
